<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TaskFlow Premium</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">TaskFlow</div>
        <div class="nav-user">
            <button id="logoutBtn" class="btn btn-danger btn-icon" title="Logout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="dashboard-header">
            <div>
                <h1>Your Dashboard</h1>
                <p class="text-muted">Manage and track your active tasks.</p>
            </div>
            <button id="addTaskBtn" class="btn btn-primary" style="width: auto; padding: 0.75rem 1.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add New Task
            </button>
        </div>

        <div id="taskGrid" class="task-grid">
            <!-- Tasks will be loaded here -->
        </div>
    </main>

    <!-- Add Task Modal -->
    <div id="taskModal" class="modal">
        <div class="glass-card modal-content">
            <h2>Add New Task</h2>
            <p>Fill in the details for your new task.</p>
            <form id="taskForm" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                </div>
                <div class="form-group">
                    <label for="taskDesc">Description</label>
                    <textarea id="taskDesc" class="form-group input" style="width: 100%; height: 100px; color: white; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border); border-radius: 0.5rem; padding: 0.75rem 1rem; resize: none;" placeholder="Provide some context..."></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="button" id="closeModal" class="btn btn-danger" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border);">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Task</button>
                </div>
            </form>
        </div>
    </div>

    <div id="notification" class="notification"></div>
    <script src="js/dashboard.js"></script>
</body>
</html>
